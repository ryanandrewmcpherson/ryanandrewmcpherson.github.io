<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Ryan Andrew McPherson</title>
    <link rel="stylesheet" href="./css/bubbles.css">
</head>
<body>
    <!-- All floating bubbles live here -->
    <div id="bubble-stage"></div>

    <!-- Semi-transparent overlay shown when a bubble is centred; click to send bubble back -->
    <div id="backdrop"></div>

    <!-- Congratulations screen after all bubbles are popped -->
    <div id="congrats" class="hidden">
        <div id="congrats-inner">
            <h1>🎉 You Popped All The Bubbles! 🎉</h1>
            <button id="replay-btn">Play Again</button>
        </div>
    </div>

    <script src="./js/bubbles.js"></script>
</body>
</html>
